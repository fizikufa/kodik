<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8" />
<title>Вход — KodikRouter Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root { color-scheme: dark; }
  body {
    margin:0; min-height:100dvh; display:grid; place-items:center;
    background:#171614; color:#cdccca;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .card {
    width:min(380px, 92vw); background:#1c1b19;
    border:1px solid #393836; border-radius:14px; padding:2rem;
    box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }
  h1 { margin:0 0 1.5rem; font-size:1.25rem; }
  label { display:block; font-size:.85rem; margin:.8rem 0 .3rem; color:#797876; }
  input {
    width:100%; padding:.7rem .9rem; box-sizing:border-box;
    background:#201f1d; border:1px solid #393836; color:#cdccca;
    border-radius:8px; outline:none; font:inherit;
  }
  input:focus { border-color:#4f98a3; }
  button {
    width:100%; margin-top:1.4rem; padding:.8rem;
    background:#4f98a3; color:#1c1b19; font-weight:700;
    border:none; border-radius:8px; cursor:pointer; font:inherit;
  }
  button:hover { background:#227f8b; }
  .err { margin-top:1rem; color:#d163a7; font-size:.85rem; min-height:1.2em; }
</style>
</head>
<body>
<form class="card" id="form">
  <h1>🛡️ KodikRouter Chat</h1>
  <label>Логин</label>
  <input id="u" autocomplete="username" required />
  <label>Пароль</label>
  <input id="p" type="password" autocomplete="current-password" required />
  <button type="submit">Войти</button>
  <div class="err" id="err"></div>
</form>
<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username: u.value, password: p.value })
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      throw new Error(d.detail || 'Ошибка входа');
    }
    const data = await r.json();
    location.href = data.is_admin ? '/admin' : '/chat';
  } catch(ex) { err.textContent = ex.message; }
});
</script>
</body>
</html>
